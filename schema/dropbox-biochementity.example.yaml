# Example biochementity dropbox file.
# Validates against schema/dropbox-biochementity.schema.json.
# Copy a trimmed-down version of this into dropbox/ and open a PR.

# Optional file-level default suggester (ORCID): applied to every entry below
# that does not set its own `suggester`. Used as prov:wasAttributedTo on the
# resulting nanopublication.
suggester: https://orcid.org/0000-0002-1825-0097

biochementity_subclasses:
  # Minimal entry: identifiers are minted on the fly, so `id` is optional.
  - name: "environmental biochementity"
    description: All abiotic environmental compartments in which chemicals can be measured
    parent_biochementities:
      - https://w3id.org/peh/terms/BioChemEntity
    group_labels:
      - 'pesticides'

  # Richer entry with a per-entry suggester override.
  - id: bioticbiochementity
    name: "biotic biochementity"
    short_name: "biotic"
    description: All biological organisms and their tissues
    parent_biochementities:
      - https://w3id.org/peh/terms/BioChemEntity
    suggester: https://orcid.org/0000-0001-5109-3700
