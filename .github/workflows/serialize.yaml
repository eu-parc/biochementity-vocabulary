name: Generate unpublished assertions

on:
  push:
    branches: [ main ]
    paths:
      - "dropbox/**"

permissions:
  contents: write

jobs:
  serialize:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7

      - run: uv sync

      - name: Run pipeline
        run: make pipeline

      - name: Commit generated assertions and archive moves
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add -A dropbox archive unpublished
          git commit -m "Process dropbox: generate unpublished assertions and archive YAML files" || echo "No changes to commit"
          git push || echo "No changes to push"
