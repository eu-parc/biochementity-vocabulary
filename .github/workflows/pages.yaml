name: Deploy Vocabulary Browser

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build site
        run: |
          uvx --from git+https://github.com/eu-parc/serves-me-right serves-me-right-build \
            --data-dir published \
            --data-dir unpublished \
            --shapes site/ui-shapes.ttl \
            --out-dir dist

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
