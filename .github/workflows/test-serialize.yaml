name: Validate vocabulary pipeline

on:
  pull_request:
    paths:
      - "dropbox/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      # No secrets: builds the proposed terms and proves each forms a valid,
      # signable defining nanopub (ephemeral key, offline). Safe for fork PRs.
      - name: Build and validate proposed terms as defining nanopubs
        run: make validate-pr

      - name: Validate expected processing effects
        run: |
          test -f build/combined.yaml || (echo "Expected build/combined.yaml to exist" && exit 1)
          grep -q "https://w3id.org/peh/biochementities/" build/combined.yaml || (echo "Expected build/combined.yaml to contain minted biochementity URIs" && exit 1)
          test -f build/biochementities.ttl || (echo "Expected build/biochementities.ttl to exist" && exit 1)
          find build/pr-assertions -maxdepth 1 -name "*.ttl" | grep -q . || (echo "Expected generated assertions for the proposed terms" && exit 1)
